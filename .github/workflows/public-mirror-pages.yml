name: Deploy StreamNova Public Mirror

on:
  push:
    branches: [ main ]
    paths:
      - "public-site/**"
      - ".github/workflows/public-mirror-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: streamnova-public-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload public mirror
        uses: actions/upload-pages-artifact@v4
        with:
          path: public-site

      - name: Deploy public mirror
        id: deployment
        uses: actions/deploy-pages@v4
