name: Build and deploy StreamNova to MonsterASP.NET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: streamnova-production
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  PRODUCTION_URL: http://streamnova.runasp.net
  WEBSITE_NAME: ${{ secrets.WEBSITE_NAME }}
  SERVER_COMPUTER_NAME: ${{ secrets.SERVER_COMPUTER_NAME }}
  SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
  SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: pwsh
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:WEBSITE_NAME)) { $missing += 'WEBSITE_NAME' }
          if ([string]::IsNullOrWhiteSpace($env:SERVER_COMPUTER_NAME)) { $missing += 'SERVER_COMPUTER_NAME' }
          if ([string]::IsNullOrWhiteSpace($env:SERVER_USERNAME)) { $missing += 'SERVER_USERNAME' }
          if ([string]::IsNullOrWhiteSpace($env:SERVER_PASSWORD)) { $missing += 'SERVER_PASSWORD' }
          if ($missing.Count -gt 0) {
            throw "Missing GitHub repository secrets: $($missing -join ', ')"
          }

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore StreamNova.csproj

      - name: Build
        run: dotnet build StreamNova.csproj --configuration Release --no-restore

      - name: Publish for MonsterASP IIS
        run: dotnet publish StreamNova.csproj --configuration Release --no-build --output ./publish --self-contained false /p:UseAppHost=false

      - name: Verify deployment package
        shell: pwsh
        run: |
          $requiredFiles = @(
            './publish/StreamNova.dll',
            './publish/StreamNova.runtimeconfig.json',
            './publish/StreamNova.deps.json',
            './publish/web.config'
          )
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required deployment file is missing: $file"
            }
          }

      - name: Create upload package
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./StreamNova-MonsterASP.zip -Force

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: streamnova-monsterasp-package
          path: StreamNova-MonsterASP.zip
          retention-days: 30

      - name: Deploy through WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ env.WEBSITE_NAME }}
          server-computer-name: ${{ env.SERVER_COMPUTER_NAME }}
          server-username: ${{ env.SERVER_USERNAME }}
          server-password: ${{ env.SERVER_PASSWORD }}

      - name: Check public health endpoint
        continue-on-error: true
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri "$env:PRODUCTION_URL/health" -TimeoutSec 20 -UseBasicParsing
              if ($response.StatusCode -eq 200) {
                Write-Host "StreamNova is publicly healthy at $env:PRODUCTION_URL"
                exit 0
              }
            }
            catch {
              Write-Warning "Public health check attempt $attempt failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 12
          }
          Write-Warning "Deployment completed, but the free runasp.net hostname could not be verified from this runner. Check DNS or use the Render/GitHub Pages fallback."
