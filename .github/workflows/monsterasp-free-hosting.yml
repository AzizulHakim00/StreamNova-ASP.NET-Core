name: Build and deploy StreamNova to MonsterASP.NET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: streamnova-production
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore StreamNova.csproj

      - name: Build
        run: dotnet build StreamNova.csproj --configuration Release --no-restore

      - name: Publish for MonsterASP IIS
        run: dotnet publish StreamNova.csproj --configuration Release --no-build --output ./publish --self-contained false /p:UseAppHost=false

      - name: Verify deployment package
        shell: pwsh
        run: |
          $requiredFiles = @(
            './publish/StreamNova.dll',
            './publish/StreamNova.runtimeconfig.json',
            './publish/StreamNova.deps.json',
            './publish/web.config'
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required deployment file is missing: $file"
            }
          }

      - name: Create upload package
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./StreamNova-MonsterASP.zip -Force

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: streamnova-monsterasp-package
          path: StreamNova-MonsterASP.zip
          retention-days: 30

      - name: Deploy through WebDeploy
        if: ${{ secrets.WEBSITE_NAME != '' && secrets.SERVER_COMPUTER_NAME != '' && secrets.SERVER_USERNAME != '' && secrets.SERVER_PASSWORD != '' }}
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
